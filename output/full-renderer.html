<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Suyn Combined Overlay</title>
<style>
    body, html { margin: 0; padding: 0; overflow: hidden; background: transparent; }
    canvas { display: block; }
    #debug { position: fixed; bottom: 4px; left: 4px; font: 11px monospace; color: #0f0; background: rgba(0,0,0,0.8); padding: 4px 8px; pointer-events: none; z-index: 10; white-space: pre; max-height: 200px; overflow: hidden; }
</style>
<script src="./wasd-suyn.js"></script>
<script src="./mouse-suyn.js"></script>
<script src="./overlay-common.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="debug"></div>
<script>
/*  ?gap=-22  pixel gap between keyboard and mouse tiles (default -22)  */
const GAP = parseInt(params.get("gap") ?? "-22");
const KB_W = KEYBOARD_PRESET.overlay_width;
const MOUSE_X_OFF = KB_W + GAP;

const kbAtlas = new Image(); kbAtlas.src = params.get("kb_atlas") || "./wasd-suyn.png";
const msAtlas = new Image(); msAtlas.src = params.get("ms_atlas") || "./mouse-suyn.png";
const kbElements = parseElements(KEYBOARD_PRESET);
const msElements = parseElements(MOUSE_PRESET, MOUSE_X_OFF);

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = MOUSE_X_OFF + MOUSE_PRESET.overlay_width;
canvas.height = Math.max(KEYBOARD_PRESET.overlay_height, MOUSE_PRESET.overlay_height);
ctx.imageSmoothingEnabled = false;
document.getElementById("debug").style.display = DEBUG ? "block" : "none";

(function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawKeyboardElements(ctx, kbAtlas, kbElements);
    tickMouseDot(msElements);
    tickWheel(msElements);
    drawMouseElements(ctx, msAtlas, msElements);
    requestAnimationFrame(draw);
})();
connectWS(kbElements, msElements);
</script>
</body>
</html>
